services:
  # Redis Stack服务 - 开发环境专用
  redis:
    image: redis/redis-stack:latest
    container_name: ai-novel-redis
    ports:
      - "6379:6379" # Redis端口
      - "8001:8001" # Redis Insight Web UI
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro # 可选：自定义配置
    environment:
      - REDIS_ARGS=--save 60 1000 --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
  # 可选：本地Ollama服务

volumes:
  redis_data:
    driver: local
